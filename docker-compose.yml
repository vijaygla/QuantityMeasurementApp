version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: quantity-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_Password123
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql

  redis:
    image: redis:alpine
    container_name: quantity-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: quantity-api
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=QuantityMeasurementDB;User Id=sa;Password=Your_Password123;TrustServerCertificate=True;
      - Redis__ConnectionString=redis:6379
      - Jwt__Key=THIS_IS_A_SECURE_32_CHARACTER_KEY_!!!
    depends_on:
      - sqlserver
      - redis

volumes:
  sqlvolume:
